<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио — Кинеограф</title>
    <style>
        /* ===== ЦВЕТОВАЯ СХЕМА (более тёмная, деловая) ===== */
        :root {
            --bg: #1a1f2e;
            --primary: #3a6b8f;
            --text: #e0e0e0;
            --text-light: #ffffff;
            --card-bg: #252b3d;
            --hover: #4d7ca3;
            --footer-bg: #1a1f2e;
            --footer-text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 100px;
        }

        /* ===== ХЕДЕР (такой же, как на главной) ===== */
        header {
            position: sticky;
            top: 20px;
            z-index: 1000;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 100px;
        }

        .header-glass {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo a {
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-btn {
            background: var(--primary);
            color: white !important;
            padding: 10px 30px !important;
            border-radius: 30px;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--hover);
            transform: scale(1.05);
        }

        /* ===== ГЛАВНЫЙ ЭКРАН ===== */
        .hero {
            text-align: center;
            padding: 80px 20px;
            margin-top: 20px;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: white;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
            color: #ccc;
        }

        /* ===== СЕТКА ПОРТФОЛИО ===== */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .portfolio-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .portfolio-info {
            padding: 20px;
        }

        .portfolio-info h3 {
            margin-bottom: 10px;
            color: white;
        }

        .portfolio-info p {
            color: #bbb;
            margin-bottom: 15px;
        }

        .portfolio-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
